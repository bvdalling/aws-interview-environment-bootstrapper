map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100m;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # code-server 4.111+ has no base-path; strip ALB prefix so upstream sees /.
    # Trailing slash on proxy_pass strips __NGINX_BASE_PATH__/ from the URI.
    location = __NGINX_BASE_PATH__ {
        if ($http_x_origin_verify != "__ORIGIN_VERIFY_EXPECTED__") {
            return 403;
        }
        return 302 __NGINX_BASE_PATH__/;
    }

    location __NGINX_BASE_PATH__/ {
        if ($http_x_origin_verify != "__ORIGIN_VERIFY_EXPECTED__") {
            return 403;
        }
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix __NGINX_BASE_PATH__;
    }

    location / {
        return 404;
    }
}
